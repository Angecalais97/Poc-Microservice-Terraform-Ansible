#version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: poc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pocdb
    ports:
      - "5432:5432"
    volumes:
      - poc_pg_data:/var/lib/postgresql/data

  orderservice:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    container_name: orderservice
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      # Example connection string, adjust DB name/user/password as in your appsettings.json
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=orderdb;Username=postgres;Password=postgres"
    depends_on:
      - postgres

  customerservice:
    build:
      context: ./CustomerService
      dockerfile: Dockerfile
    container_name: customerservice
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=customerdb;Username=postgres;Password=postgres"
    depends_on:
      - postgres

  catalogservice:
    build:
      context: ./CatalogService
      dockerfile: Dockerfile
    container_name: catalogservice
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=catalogdb;Username=postgres;Password=postgres"
    depends_on:
      - postgres

volumes:
  poc_pg_data:
