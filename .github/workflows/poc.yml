name: CD to AWS EC2 (Terraform + Ansible)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

# Prevent two runs from applying at the same time
concurrency:
  group: cd-aws-ec2-main
  cancel-in-progress: false

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    outputs:
      ec2_ip: ${{ steps.tf-output.outputs.ec2_ip }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform init (remote state)
        working-directory: terraform
        run: terraform init -reconfigure -input=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false

      - name: Get EC2 public IP
        id: tf-output
        working-directory: terraform
        run: |
          ip=$(terraform output -raw public_ip)
          echo "ec2_ip=$ip" >> "$GITHUB_OUTPUT"

  ansible-deploy:
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Ansible and community.docker collection
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-pip
          ansible-galaxy collection install community.docker

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/devops-poc-ec2
          chmod 600 ~/.ssh/devops-poc-ec2

      - name: Add EC2 to known_hosts
        run: |
          ssh-keyscan -H "${{ needs.terraform-apply.outputs.ec2_ip }}" >> ~/.ssh/known_hosts

      - name: Create Ansible inventory (from Terraform output)
        run: |
          mkdir -p terraform/ansible/inventory
          cat > terraform/ansible/inventory/ec2.ini <<EOF
          [poc_ec2]
          ${{ needs.terraform-apply.outputs.ec2_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/devops-poc-ec2
          EOF

      - name: Run install_docker playbook
        working-directory: terraform/ansible
        run: ansible-playbook -i inventory/ec2.ini install_docker.yml

      - name: Run deploy_compose playbook
        working-directory: terraform/ansible
        run: ansible-playbook -i inventory/ec2.ini deploy_compose.yml
